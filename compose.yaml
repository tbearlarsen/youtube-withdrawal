services:
  youtube-withdrawal:
    build: .
    container_name: youtube-withdrawal
    restart: unless-stopped
    ports:
      - "8008:8080"
    environment:
      - TA_URL=http://tubearchivist:8000
      - TA_API_KEY=${TA_API_KEY}
      - TA_PUBLIC_URL=${TA_PUBLIC_URL}
    volumes:
      - ./data:/app/data
    networks:
      - tubearchivist_default

networks:
  tubearchivist_default:
    external: true
