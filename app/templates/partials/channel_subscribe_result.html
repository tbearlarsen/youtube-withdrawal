<div class="flex items-center gap-4 mt-4 p-4 bg-gray-700/60 rounded-xl border border-gray-600">
    {% if channel.channel_thumb_url %}
    <img src="{{ channel.channel_thumb_url | ta_thumb }}"
         class="w-12 h-12 rounded-full object-cover shrink-0"
         alt="{{ channel.channel_name }}">
    {% else %}
    <div class="w-12 h-12 rounded-full bg-gray-600 shrink-0"></div>
    {% endif %}

    <div class="flex-1 min-w-0">
        <p class="text-sm font-semibold text-white">{{ channel.channel_name }}</p>
        {% if channel.channel_subs %}
        <p class="text-xs text-gray-400">{{ "{:,}".format(channel.channel_subs) }} subscribers</p>
        {% endif %}
    </div>

    {% if channel.channel_subscribed %}
    <span class="text-xs text-green-400 font-medium shrink-0">Already subscribed</span>
    {% else %}
    <button hx-post="/channels/{{ channel.channel_id }}/subscribe"
            hx-target="closest div"
            hx-swap="outerHTML"
            class="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg text-sm font-medium transition-colors shrink-0">
        Subscribe
    </button>
    {% endif %}
</div>
