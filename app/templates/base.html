<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YouTube Withdrawal{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/static/htmx.min.js"></script>

    <script>
        (function () {
            var t = localStorage.getItem('yw-theme') || 'system';
            var resolved = t === 'system'
                ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
                : t;
            document.documentElement.setAttribute('data-theme', resolved);
        })();
    </script>

    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }
        .htmx-request.htmx-indicator { display: inline; }

        h1, h2, h3, h4 {
            font-family: Georgia, 'Times New Roman', serif;
            font-weight: 400;
        }

        /* ── Light theme ─────────────────────────────── */
        [data-theme="light"] {
            --c-bg:       #faf9f7;
            --c-surface:  #ffffff;
            --c-surface2: #f4f2ee;
            --c-hover:    #ede9e2;
            --c-border:   #ddd8d0;
            --c-border2:  #ede9e2;
            --c-text:     #2c2c2c;
            --c-text2:    #5a5550;
            --c-text3:    #8a8480;
            --c-text4:    #aaa49e;
            --c-accent:   #9b2030;
            --c-accent-h: #7d1a28;
            --c-pending:  #a07828;
            --c-queued:   #3a7252;
        }

        /* ── Dark theme ──────────────────────────────── */
        [data-theme="dark"] {
            --c-bg:       #1c1814;
            --c-surface:  #252118;
            --c-surface2: #302b23;
            --c-hover:    #3a342c;
            --c-border:   #3a342c;
            --c-border2:  #252118;
            --c-text:     #f0ece4;
            --c-text2:    #d4cec4;
            --c-text3:    #9a9288;
            --c-text4:    #6a6460;
            --c-accent:   #c44b4b;
            --c-accent-h: #a83c3c;
            --c-pending:  #c49a42;
            --c-queued:   #5eab80;
        }

        /* ── Tailwind overrides ──────────────────────── */
        .bg-gray-900 { background-color: var(--c-bg)      !important; }
        .bg-gray-800 { background-color: var(--c-surface)  !important; }
        .bg-gray-700 { background-color: var(--c-surface2) !important; }
        .bg-gray-600 { background-color: var(--c-hover)    !important; }
        .hover\:bg-gray-700\/60:hover { background-color: color-mix(in srgb, var(--c-surface2) 60%, transparent) !important; }
        .hover\:bg-gray-700:hover     { background-color: var(--c-surface2) !important; }
        .hover\:bg-gray-600:hover     { background-color: var(--c-hover)    !important; }
        .border-gray-700     { border-color: var(--c-border)  !important; }
        .border-gray-700\/50 { border-color: color-mix(in srgb, var(--c-border) 50%, transparent) !important; }
        .border-gray-800     { border-color: var(--c-border2) !important; }
        .text-white    { color: var(--c-text)  !important; }
        .text-gray-300 { color: var(--c-text2) !important; }
        .text-gray-400 { color: var(--c-text3) !important; }
        .text-gray-500 { color: var(--c-text4) !important; }
        .text-gray-600 { color: var(--c-text4) !important; }
        .divide-gray-800 > * + * { border-color: var(--c-border2) !important; }
        .bg-red-600              { background-color: var(--c-accent)   !important; }
        .hover\:bg-red-700:hover { background-color: var(--c-accent-h) !important; }
        .text-red-400  { color: var(--c-accent) !important; }
        .text-red-500  { color: var(--c-accent) !important; }
        .border-red-500 { border-color: var(--c-accent) !important; }
        .focus\:border-red-500:focus { border-color: var(--c-accent) !important; }
        .hover\:border-red-500\/50:hover { border-color: color-mix(in srgb, var(--c-accent) 50%, transparent) !important; }
        .text-yellow-500   { color: var(--c-pending) !important; }
        .bg-yellow-500\/20 { background-color: color-mix(in srgb, var(--c-pending) 15%, transparent) !important; }
        .text-yellow-400   { color: var(--c-pending) !important; }
        .text-green-400    { color: var(--c-queued)  !important; }
        .bg-green-900\/20  { background-color: color-mix(in srgb, var(--c-queued) 12%, transparent) !important; }
        .bg-green-400      { background-color: var(--c-queued) !important; }
        .text-blue-400     { color: #5b8dd9 !important; }
        [data-theme="dark"] .text-blue-400 { color: #7ba7e8 !important; }
        .from-gray-800 { --tw-gradient-from: var(--c-surface)  !important; }
        .to-gray-700   { --tw-gradient-to:   var(--c-surface2) !important; }
        [data-theme="light"] .from-gray-900    { --tw-gradient-from: rgba(244,242,238,1)   !important; }
        [data-theme="light"] .via-gray-900\/40 { --tw-gradient-via:  rgba(244,242,238,0.4) !important; }
        [data-theme="dark"]  .from-gray-900    { --tw-gradient-from: rgba(28,24,20,1)      !important; }
        [data-theme="dark"]  .via-gray-900\/40 { --tw-gradient-via:  rgba(28,24,20,0.4)    !important; }
        .ring-gray-900 { --tw-ring-color: var(--c-bg) !important; }
        .text-fixed-white { color: #fff !important; }

        /* ── Card shadows + hover lift ───────────────── */
        .video-card, .channel-card {
            box-shadow: 0 2px 14px rgba(44,36,28,0.08), 0 1px 3px rgba(44,36,28,0.04);
            transition: transform 240ms cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 240ms ease;
            will-change: transform;
        }
        .video-card:hover, .channel-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(44,36,28,0.13), 0 3px 10px rgba(44,36,28,0.06);
        }
        [data-theme="dark"] .video-card,
        [data-theme="dark"] .channel-card {
            box-shadow: 0 2px 14px rgba(0,0,0,0.5), 0 1px 4px rgba(0,0,0,0.3);
        }
        [data-theme="dark"] .video-card:hover,
        [data-theme="dark"] .channel-card:hover {
            box-shadow: 0 14px 40px rgba(0,0,0,0.7), 0 3px 12px rgba(0,0,0,0.45);
        }

        /* ── Buttons ─────────────────────────────────── */
        .btn-outline {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--c-accent); color: var(--c-accent); background: transparent;
            border-radius: 0.5rem;
            font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
            font-family: system-ui, sans-serif; cursor: pointer;
            transition: background-color 150ms, color 150ms; text-decoration: none;
        }
        .btn-outline:hover { background-color: var(--c-accent); color: #fff; }
        .btn-secondary {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.35rem;
            padding: 0.375rem 0.75rem;
            border: 1px solid var(--c-border); color: var(--c-text3); background: transparent;
            border-radius: 0.5rem;
            font-size: 0.6rem; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 500;
            font-family: system-ui, sans-serif; cursor: pointer;
            transition: border-color 150ms, color 150ms; text-decoration: none;
        }
        .btn-secondary:hover { border-color: var(--c-text3); color: var(--c-text); }

        /* ── Status ──────────────────────────────────── */
        .status-badge {
            display: inline-flex; align-items: center; gap: 0.3rem;
            font-size: 0.6rem; letter-spacing: 0.09em; text-transform: uppercase;
            font-weight: 500; font-family: system-ui, sans-serif;
        }
        .status-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

        /* ── Top nav ─────────────────────────────────── */
        #topnav {
            position: fixed;
            top: 0; left: 0; right: 0;
            height: 52px;
            background-color: color-mix(in srgb, var(--c-bg) 75%, transparent);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0 1.25rem;
            z-index: 100;
        }
        .nav-tab {
            display: inline-flex; align-items: center;
            padding: 0.35rem 0.7rem;
            border-radius: 0.375rem;
            font-size: 0.65rem; letter-spacing: 0.1em; text-transform: uppercase;
            font-weight: 500; font-family: system-ui, sans-serif;
            color: var(--c-text3);
            text-decoration: none;
            transition: color 150ms, background-color 150ms;
        }
        .nav-tab:hover { color: var(--c-text); background-color: var(--c-hover); }
        .nav-tab.active { color: var(--c-text); background-color: var(--c-hover); }
        .nav-brand {
            display: flex; align-items: center; gap: 0.5rem;
            text-decoration: none; color: var(--c-text);
        }
        .settings-btn {
            display: flex; align-items: center; justify-content: center;
            width: 32px; height: 32px; border-radius: 0.375rem;
            color: var(--c-text3); text-decoration: none;
            transition: color 150ms, background-color 150ms;
        }
        .settings-btn:hover, .settings-btn.active { color: var(--c-text); background-color: var(--c-hover); }

        /* ── Library sidebar ─────────────────────────── */
        #lib-sidebar {
            width: 13rem;
            flex-shrink: 0;
            position: sticky;
            top: 52px;
            height: calc(100vh - 52px);
            overflow-y: auto;
            padding: 1rem 0.625rem;
        }
        #lib-panel {
            background: color-mix(in srgb, var(--c-surface) 72%, transparent);
            backdrop-filter: blur(20px) saturate(1.5);
            -webkit-backdrop-filter: blur(20px) saturate(1.5);
            border-radius: 14px;
            border: 1px solid color-mix(in srgb, var(--c-border) 50%, transparent);
            box-shadow: 0 2px 18px rgba(44,36,28,0.08), 0 1px 4px rgba(44,36,28,0.05),
                        inset 0 1px 0 rgba(255,255,255,0.5);
            padding: 0.4rem;
        }
        [data-theme="dark"] #lib-panel {
            background: color-mix(in srgb, var(--c-surface) 65%, transparent);
            box-shadow: 0 4px 28px rgba(0,0,0,0.45), 0 1px 8px rgba(0,0,0,0.28),
                        inset 0 1px 0 rgba(255,255,255,0.05);
        }
        .lib-nav-item {
            display: flex; align-items: center; gap: 0.65rem;
            padding: 0.55rem 0.75rem;
            border-radius: 0.375rem;
            font-size: 0.65rem; letter-spacing: 0.08em; text-transform: uppercase;
            font-weight: 500; font-family: system-ui, sans-serif;
            color: var(--c-text3); text-decoration: none;
            transition: color 150ms, background-color 150ms;
            margin-bottom: 0.1rem;
        }
        .lib-nav-item:hover { color: var(--c-text); background-color: var(--c-hover); }
        .lib-nav-item.active { color: var(--c-text); background-color: var(--c-hover); }

        /* ── Page body ───────────────────────────────── */
        body { background-color: var(--c-bg); color: var(--c-text); }
        #page-body { padding-top: 52px; min-height: 100vh; }
        #page-body.has-sidebar { display: flex; }
        #lib-content { flex: 1; min-width: 0; }

        /* ── Mobile bottom nav ───────────────────────── */
        #mobile-lib-nav {
            display: none;
            position: fixed;
            bottom: 0; left: 0; right: 0;
            height: 56px;
            background-color: color-mix(in srgb, var(--c-bg) 88%, transparent);
            backdrop-filter: blur(24px) saturate(1.4);
            -webkit-backdrop-filter: blur(24px) saturate(1.4);
            border-top: 1px solid var(--c-border);
            z-index: 90;
            justify-content: space-around;
            align-items: center;
        }
        .mobile-lib-item {
            display: flex; flex-direction: column; align-items: center; gap: 0.25rem;
            flex: 1; padding: 0.5rem 0;
            text-decoration: none;
            color: var(--c-text3);
            font-size: 0.48rem; letter-spacing: 0.08em; text-transform: uppercase;
            font-weight: 600; font-family: system-ui, sans-serif;
            transition: color 150ms;
        }
        .mobile-lib-item.active { color: var(--c-text); }
        .mobile-lib-item svg { width: 22px; height: 22px; }

        /* ── Mobile breakpoint (< 640px) ────────────── */
        @media (max-width: 639px) {
            #lib-sidebar { display: none !important; }
            #mobile-lib-nav { display: flex !important; }
            #page-body.has-sidebar { padding-bottom: 56px; }
            #lib-content { width: 100%; }
            #lib-content .p-8 { padding: 1rem !important; }
            #settings-outer { padding: 1rem 0.75rem !important; }
            #settings-nav { display: none !important; }
        }
    </style>
</head>
<body class="antialiased">

<!-- ── Top nav ──────────────────────────────────────────── -->
<header id="topnav">

    <!-- Left: Home / Library tabs -->
    <div class="flex items-center gap-1">
        <a href="/" class="nav-tab {% if active_section == 'home' %}active{% endif %}">Home</a>
        <a href="/channels" class="nav-tab {% if active_section == 'library' %}active{% endif %}">Library</a>
        {% set _watch = watch_url() %}
        {% if _watch %}
        <a href="{{ _watch }}" target="_blank" rel="noopener" class="nav-tab">Watch</a>
        {% endif %}
    </div>

    <!-- Center: Brand -->
    <a href="/" class="nav-brand">
        <div style="color:var(--c-accent)">
            <svg viewBox="0 0 24 24" fill="currentColor" style="width:20px;height:20px">
                <path d="M23.5 6.19a3.02 3.02 0 00-2.12-2.14C19.52 3.5 12 3.5 12 3.5s-7.52 0-9.38.55A3.02 3.02 0 00.5 6.19C0 8.07 0 12 0 12s0 3.93.5 5.81a3.02 3.02 0 002.12 2.14C4.48 20.5 12 20.5 12 20.5s7.52 0 9.38-.55a3.02 3.02 0 002.12-2.14C24 15.93 24 12 24 12s0-3.93-.5-5.81zM9.75 15.02V8.98L15.5 12l-5.75 3.02z"/>
            </svg>
        </div>
        <span style="font-family:Georgia,'Times New Roman',serif;font-size:1rem;font-weight:500;letter-spacing:-0.01em">Withdrawal</span>
    </a>

    <!-- Right: Settings -->
    <div class="flex items-center justify-end">
        <a href="/settings" class="settings-btn {% if active_section == 'settings' %}active{% endif %}" title="Settings">
            <svg style="width:16px;height:16px" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
            </svg>
        </a>
    </div>

</header>

<!-- ── Page body ─────────────────────────────────────────── -->
<div id="page-body" class="{% if active_section == 'library' %}has-sidebar{% endif %}">

    {% if active_section == 'library' %}
    <!-- Library sidebar -->
    <aside id="lib-sidebar">
    <div id="lib-panel">

        <a href="/channels" class="lib-nav-item {% if active_page == 'channels' %}active{% endif %}">
            <svg style="width:14px;height:14px;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
            Channels
            <span hx-get="/channels/pending-total" hx-trigger="load" hx-swap="outerHTML" class="ml-auto"></span>
        </a>

        <a href="/pending" class="lib-nav-item {% if active_page == 'pending' %}active{% endif %}">
            <svg style="width:14px;height:14px;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M4 6h16M4 10h16M4 14h10"/>
            </svg>
            All Videos
        </a>

        <a href="/queue" class="lib-nav-item {% if active_page == 'queue' %}active{% endif %}">
            <svg style="width:14px;height:14px;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            Queue
        </a>

        <a href="/downloads" class="lib-nav-item {% if active_page == 'downloads' %}active{% endif %}">
            <svg style="width:14px;height:14px;flex-shrink:0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2zm7 5v6m0 0l-3-3m3 3l3-3"/>
            </svg>
            Downloads
        </a>

    </div>
    </aside>
    {% endif %}

    <!-- Main content -->
    <div id="lib-content">
        {% block content %}{% endblock %}
    </div>

    {% if active_section == 'library' %}
    <!-- Mobile bottom nav (hidden on desktop via CSS) -->
    <nav id="mobile-lib-nav">
        <a href="/channels" class="mobile-lib-item {% if active_page == 'channels' %}active{% endif %}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
            </svg>
            Channels
        </a>
        <a href="/pending" class="mobile-lib-item {% if active_page == 'pending' %}active{% endif %}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M4 6h16M4 10h16M4 14h10"/>
            </svg>
            All Videos
        </a>
        <a href="/queue" class="mobile-lib-item {% if active_page == 'queue' %}active{% endif %}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
            </svg>
            Queue
        </a>
        <a href="/downloads" class="mobile-lib-item {% if active_page == 'downloads' %}active{% endif %}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75" d="M5 3h14a2 2 0 012 2v14a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2zm7 5v6m0 0l-3-3m3 3l3-3"/>
            </svg>
            Downloads
        </a>
    </nav>
    {% endif %}

</div>

<script>
    function resolveTheme(t) {
        return t === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : t;
    }
    function applyTheme(t) {
        document.documentElement.setAttribute('data-theme', resolveTheme(t));
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
        if ((localStorage.getItem('yw-theme') || 'system') === 'system') applyTheme('system');
    });
    applyTheme(document.documentElement.getAttribute('data-theme') || 'dark');
</script>
</body>
</html>
